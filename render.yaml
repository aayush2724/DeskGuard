services:
  - type: web
    name: deskguard-api
    runtime: node
    rootDir: server
    buildCommand: npm install && cd ../client && npm install && npm run build
    startCommand: node src/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: deskguard-db
          property: connectionString
      - key: REDIS_URL
        fromRedis:
          name: deskguard-redis
          property: connectionString
      - key: AWAY_TTL_SECONDS
        value: 1200
      - key: CHECKIN_TTL_SECONDS
        value: 7200
      - key: LIBRARIAN_API_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false

databases:
  - name: deskguard-db
    plan: free
    databaseName: deskguard
    ipAllowList: []

  - name: deskguard-redis
    plan: free
